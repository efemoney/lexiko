[versions]
agp = "7.0.0-alpha15"
kotlin = "1.4.32"
coroutines = "1.4.3"
moshi = "1.11.0"
moshix = "0.9.2"
okio = "2.10.0"
okhttp = "4.9.1"
retrofit = "2.9.0"
dagger = "2.33"
hilt = "2.33-beta"
glide = "4.12.0"
material = "1.3.0"
timber = "4.7.1"
androidx-core = "1.5.0-beta02"
androidx-compose = "1.0.0-beta03"
androidx-fragment = "1.3.2"
androidx-activity = "1.3.0-alpha05"
androidx-appcompat = "1.3.0-rc01"
androidx-constraintLayout = "2.0.4"
androidx-coordinatorLayout = "1.1.0"
androidx-lifecycle = "2.3.0"
androidx-navigation = "2.3.3"
androidx-preference = "1.1.1"
androidx-recyclerview = "1.1.0"

[libraries]
jsr250 = "javax.annotation:jsr250-api:1.0"
okio = { module = "com.squareup.okio:okio", version.ref = "okio" }
timber = { module = "com.jakewharton.timber:timber", version.ref = "timber" }
kotlin-bom = { module = "org.jetbrains.kotlin:kotlin-bom", version.ref = "kotlin" }
kotlin-stdlib-common = { module = "org.jetbrains.kotlin:kotlin-stdlib-common", version.ref = "kotlin" }
kotlin-stdlib-jdk8 = { module = "org.jetbrains.kotlin:kotlin-stdlib-jdk8", version.ref = "kotlin" }
kotlinx-datetime = "org.jetbrains.kotlinx:kotlinx-datetime:0.1.1"
kotlinx-coroutines-bom = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-bom", version.ref = "coroutines" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "coroutines" }
kotlinx-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "coroutines" }
kotlinx-coroutines-playServices = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-play-services", version.ref = "coroutines" }
androidx-core = { module = "androidx.core:core-ktx", version.ref = "androidx-core" }
androidx-activity = { module = "androidx.activity:activity-ktx", version.ref = "androidx-activity" }
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "androidx-appcompat" }
androidx-fragment = { module = "androidx.fragment:fragment-ktx", version.ref = "androidx-fragment" }
androidx-fragmentTesting = { module = "androidx.fragment:fragment-testing", version.ref = "androidx-fragment" }
androidx-preference = { module = "androidx.preference:preference-ktx", version.ref = "androidx-preference" }
androidx-recyclerView = { module = "androidx.recyclerview:recyclerview", version.ref = "androidx-recyclerview" }
androidx-constraintLayout = { module = "androidx.constraintlayout:constraintlayout", version.ref = "androidx-constraintLayout" }
androidx-coordinatorLayout = { module = "androidx.coordinatorlayout:coordinatorlayout", version.ref = "androidx-coordinatorLayout" }
androidx-compose-ui-ui = { module = "androidx.compose.ui:ui", version.ref = "androidx-compose" }
androidx-compose-ui-test = { module = "androidx.compose.ui:ui-test", version.ref = "androidx-compose" }
androidx-compose-ui-util = { module = "androidx.compose.ui:ui-util", version.ref = "androidx-compose" }
androidx-compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling", version.ref = "androidx-compose" }
androidx-compose-material = { module = "androidx.compose.material:material", version.ref = "androidx-compose" }
androidx-navigation-ui = { module = "androidx.navigation:navigation-ui-ktx", version.ref = "androidx-navigation" }
androidx-navigation-runtime = { module = "androidx.navigation:navigation-runtime-ktx", version.ref = "androidx-navigation" }
androidx-navigation-fragment = { module = "androidx.navigation:navigation-fragment-ktx", version.ref = "androidx-navigation" }
androidx-lifecycle-runtime = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "androidx-lifecycle" }
androidx-lifecycle-viewModel = { module = "androidx.lifecycle:lifecycle-viewmodel-ktx", version.ref = "androidx-lifecycle" }

[bundles]
boms = [
    "kotlin-bom",
    "kotlinx-coroutines-bom",
]
androidx = [
    "androidx-core",
    "androidx-activity",
    "androidx-appcompat",
    "androidx-fragment",
    "androidx-constraintLayout",
    "androidx-coordinatorLayout",
]
compose = [
    "androidx-compose-ui-ui",
    "androidx-compose-material",
]

